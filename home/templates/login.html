<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'admin/css/log.css' %}">
    <style>
        .error-text {
            color: red;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
        }
        .error-input {
            border: 1px solid red;
            background-color: #ffe6e6;
        }
    </style>
    <title>Login</title>
</head>
<body>
    <div class="container">
        <div class="filter"></div>

        <div class="form-container">
            <form method="POST">
                {% csrf_token %}
                {% if error %}
                    <div class="error-text">{{ error }}</div>
                {% endif %}

                <div class="input-block">
                    <label for="login">Login</label>
                    <input id="login" type="text" name="login" class="{% if error %}error-input{% endif %}" required>
                </div>
                <div class="input-block">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" class="{% if error %}error-input{% endif %}" required>
                </div>

                <div class="button-block">
                    <button type="submit">Sign in</button>
                </div>

                <div style="text-align: center; margin-top: 10px;">
                    <a href="{% url 'reg' %}" style="text-decoration: none; color: #007bff; font-size: 14px;">reg</a>
                </div>
            </form>
        </div>

        <div class="filter"></div>
    </div>
</body>
</html>
